name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    name: Build & Push to Amazon ECR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build, Tag, and Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: latest
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy-to-ec2:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

    steps:
    - name: Configure AWS Credentials
      if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
      uses: aws-actions/amazon-ecr-login@v2

    - name: Get ECR Auth Token
      id: get-token
      if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
      run: |
        echo "token=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> $GITHUB_OUTPUT

    - name: SSH into EC2 and Deploy Container
      if: ${{ env.EC2_HOST != '' && env.EC2_SSH_KEY != '' }}
      uses: appleboy/ssh-action@v1.0.3
      env:
        ECR_PASSWORD: ${{ steps.get-token.outputs.token }}
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: ECR_PASSWORD,ECR_REGISTRY,ECR_REPOSITORY
        script: |
          # Login to ECR on EC2 using the token from the GitHub runner
          echo "$ECR_PASSWORD" | docker login --username AWS --password-stdin $ECR_REGISTRY
          
          # Pull the latest image
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # Stop and remove the old container
          docker stop iris-api || true
          docker rm iris-api || true
          
          # Run the new container
          docker run -d -p 8000:8000 --name iris-api $ECR_REGISTRY/$ECR_REPOSITORY:latest



